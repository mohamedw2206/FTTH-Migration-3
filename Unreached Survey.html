<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Full Smart System</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  padding: 20px;
}
.container {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  max-width: 900px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
h2 { margin-bottom: 20px; }

.section {
  margin-bottom: 15px;
}

.options label {
  margin-right: 15px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  display: none;
  font-weight: bold;
}

.success { background: #d4edda; }
.warning { background: #fff3cd; }
.danger { background: #f8d7da; }

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.copy { background: #28a745; color: white; }
.reset { background: #dc3545; color: white; }

.note {
  margin-top: 15px;
  padding: 10px;
  background: #e9ecef;
  border-radius: 8px;
  display: none;
}
</style>

</head>
<body>

<div class="container">

<h2>FTTH Full Decision System</h2>

<div class="section">
<label>Survey Status</label><br>
<label><input type="radio" name="surveyStatus" value="normal"> Normal</label>
<label><input type="radio" name="surveyStatus" value="unreached"> Unreached Survey</label>
</div>

<div class="section">
<label>Survey Grace Period</label><br>
<label><input type="radio" name="grace" value="yes"> Yes</label>
<label><input type="radio" name="grace" value="no"> No</label>
</div>

<div class="section">
<label>Customer Problem</label><br>
<label><input type="radio" name="problem" value="yes"> Yes</label>
<label><input type="radio" name="problem" value="no"> No</label>
</div>

<div class="section">
<label>Customer Reachable</label><br>
<label><input type="radio" name="reachable" value="yes"> Yes</label>
<label><input type="radio" name="reachable" value="no"> No</label>
</div>

<div class="section">
<label>Problem Resolved</label><br>
<label><input type="radio" name="resolved" value="yes"> Yes</label>
<label><input type="radio" name="resolved" value="no"> No</label>
</div>

<div id="result"></div>

<div id="note" class="note"></div>

<button class="copy" onclick="copyResult()">Copy</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generate));

function generate() {
  const surveyStatus = document.querySelector('input[name="surveyStatus"]:checked')?.value;
  const grace = document.querySelector('input[name="grace"]:checked')?.value;
  const problem = document.querySelector('input[name="problem"]:checked')?.value;
  const reachable = document.querySelector('input[name="reachable"]:checked')?.value;
  const resolved = document.querySelector('input[name="resolved"]:checked')?.value;

  const box = document.getElementById("result");
  const note = document.getElementById("note");

  if (!surveyStatus || !grace || !problem || !reachable || !resolved) {
    box.style.display = "none";
    note.style.display = "none";
    return;
  }

  let text = "";
  let cls = "";
  let noteText = "";

  if (surveyStatus === "unreached") {
    text = "Unreached Survey → SLA: 5 Days";
    cls = "danger";
    noteText = "Customer not reachable. Follow survey team and check FO readiness before proceeding.";
  }

  else if (grace === "yes" && problem === "yes") {

    if (reachable === "no") {
      text = "SR: FBB Non Tech follow up -> FTTH Migration -> MSAN Deactivation - CST Informed";
      cls = "danger";
      noteText = "Customer unreachable → MSAN service will be deactivated and SMS sent.";
    }

    else if (resolved === "yes") {
      text = "Close TT with success and continue order normally";
      cls = "success";
      noteText = "Problem solved after visit → Close ticket and continue process.";
    }

    else {
      text = "SR: FBB Non Tech follow up -> FTTH Migration -> Survey Grace Period - CST Informed";
      cls = "warning";
      noteText = "Follow customer within 24H and open TT.";
    }

  }

  else {
    text = "Follow customer within 24H + Open TT";
    cls = "warning";
    noteText = "Standard follow-up process.";
  }

  box.style.display = "block";
  box.className = cls;
  box.innerText = text;

  note.style.display = "block";
  note.innerText = noteText;
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  if (!text) return;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function resetAll() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.getElementById("result").style.display = "none";
  document.getElementById("note").style.display = "none";
}

</script>

</body>
</html>
