<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Direct to CSO Tool</title>

<style>
body {font-family: Arial; background:#f5f5f5; padding:20px;}
.container {background:#fff; padding:20px; border-radius:10px; max-width:600px; margin:auto;}
.section {margin-bottom:15px;}
#result {margin-top:20px; padding:15px; border-radius:8px; display:none; font-weight:bold; background:#fff3cd;}
.note {margin-top:10px; padding:10px; background:#e9ecef; border-radius:8px; display:none;}
button {margin-top:10px; padding:8px 12px; border:none; border-radius:6px; cursor:pointer;}
.copy {background:green; color:white;}
.reset {background:red; color:white;}
</style>

</head>
<body>

<div class="container">

<h3>Direct to CSO</h3>

<div class="section">
<label>Order in Direct to CSO Stage</label><br>
<label><input type="radio" name="cso" value="yes"> Yes</label>
<label><input type="radio" name="cso" value="no"> No</label>
</div>

<div id="result"></div>
<div id="note" class="note"></div>

<button class="copy" onclick="copyResult()">Copy</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generate));

function generate() {
  const cso = document.querySelector('input[name="cso"]:checked')?.value;

  const result = document.getElementById("result");
  const note = document.getElementById("note");

  if (!cso) {
    result.style.display = "none";
    note.style.display = "none";
    return;
  }

  if (cso === "yes") {
    result.style.display = "block";
    result.innerText =
      "SR: FBB Non Tech follow up -> FTTH Migration -> Direct to CSO - CST Informed";

    note.style.display = "block";
    note.innerText =
      "Do NOT close TT. Add comment only. Direct customer to CSO to receive device.";
  } else {
    result.style.display = "block";
    result.innerText = "No action required";
    note.style.display = "none";
  }
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  if (!text) return;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function resetAll() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.getElementById("result").style.display = "none";
  document.getElementById("note").style.display = "none";
}

</script>

</body>
</html>
