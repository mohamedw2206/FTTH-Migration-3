<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Smart Tools Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  margin: 0;
}

header {
  background: #343a40;
  color: white;
  padding: 15px;
  text-align: center;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  background: #fff;
  border-bottom: 2px solid #ddd;
}

.tabs button {
  padding: 10px 15px;
  border: none;
  background: none;
  cursor: pointer;
  transition: 0.2s;
}

.tabs button:hover { background: #eee; }

.tabs button.activeTab {
  background-color: #007bff;
  color: white;
}

#delayTab.active {
  background-color: red;
  color: white;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

.notes-box {
  background: #ffffff;
  padding: 10px;
  border-bottom: 2px solid #ddd;
}

textarea {
  width: 100%;
  height: 140px;
  resize: vertical;
  padding: 10px;
  font-size: 14px;
}

.actions { margin-top: 5px; }

button.copy {
  background: #28a745;
  color: white;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
}

iframe {
  width: 100%;
  height: 75vh;
  border: none;
}
</style>
</head>

<body>

<header>
  <h2>🔥 FTTH Smart Tools Dashboard</h2>
</header>

<div class="tabs">
  <button onclick="loadTab('Direct to CSO.html'); setActiveTab(this)">Direct to CSO</button>
  <button onclick="loadTab('Network Activation.html'); setActiveTab(this)">Network Activation</button>
  <button onclick="loadTab('Check CPE SN Activity.html'); setActiveTab(this)">Check CPE</button>
  <button onclick="loadTab('Home Visit De-activation.html'); setActiveTab(this)">MSAN Deactivation</button>
  <button onclick="loadTab('Home Visit Grace Period.html'); setActiveTab(this)">Home Visit Grace</button>
  <button onclick="loadTab('Home visit Dispatch.html'); setActiveTab(this)">Dispatch</button>
  <button onclick="loadTab('Unreached Survey.html'); setActiveTab(this)">Unreached Survey</button>
  <button onclick="loadTab('Survey De-activation.html'); setActiveTab(this)">Survey Deactivation</button>
  <button onclick="loadTab('Survey grace period.html'); setActiveTab(this)">Survey Grace</button>
  <button onclick="loadTab('Survey and Resurvey.html'); setActiveTab(this)">Survey</button>
  <button onclick="loadTab('Customer readiness notification.html'); setActiveTab(this)">Readiness</button>
  <button onclick="loadTab('Deactivated on CST 360.html'); setActiveTab(this)">CST360</button>

  <button id="delayTab" onclick="openDelay(); setActiveTab(this)">🚨 Delay Cases</button>
</div>

<div class="notes-box">
  <b>📒 Notes:</b>
  <textarea id="notes"></textarea>

  <div class="actions">
    <button class="copy" onclick="copyNote()">Copy</button>
  </div>
</div>

<iframe id="frame" src="Direct to CSO.html"></iframe>

<script>
let currentTab = "Direct to CSO.html";

let notesData = {

"Deactivated on CST 360.html":
`في حالة عدم وجود Profile للعميل على CST-360:

1- التأكد من وجود FTTH Migration Order
2- متابعة حسب Order Activity

⚠️ Internal use only`,

"Customer readiness notification.html":
`Migration Customers only

- العميل هيستقبل SMS إن التحويل هيبدأ خلال 7 أيام

📞 لو اتصل:
- يجهز routing
- نقفل TT بـ Success

⚠️ لا تغلق Not Solved`,

"Survey and Resurvey.html":
`Survey Stage

- الفني بيتأكد من الجاهزية
- مد الفايبر لحد باب الشقة

⚠️ Error: No Free Port
→ مفيش أماكن بالسنترال

SLA: No estimated time`,

"Survey grace period.html":
`Survey Grace Period

- مشكلة عند العميل
- Automatic TT

📞 Follow up خلال 24H`,

"Survey De-activation.html":
`Survey Deactivation

- العميل unreachable
- SMS بإلغاء MSAN

📞 لو اتصل:
- الخدمة القديمة غير متاحة
- نقفل Success`,

"Unreached Survey.html":
`Unreached Survey

- الفني لم يتمكن من الوصول

SLA: 5 Days`,

"Home visit Dispatch.html":
`Home Visit Dispatch

- تركيب ONT + تفعيل الخدمة

⚠️ CRM Payment Issue:
→ توجيه CSO
→ لا تغلق TT`,

"Home Visit Grace Period.html":
`Home Visit Grace

- Customer Problem
- Follow up خلال 24H

📞 لو المشكلة اتحلت:
→ Close Success`,

};

function loadTab(page) {
  localStorage.setItem(currentTab, document.getElementById("notes").value);

  currentTab = page;
  document.getElementById("frame").src = page;

  let saved = localStorage.getItem(page);

  if (saved) {
    document.getElementById("notes").value = saved;
  } else {
    document.getElementById("notes").value = notesData[page] || "";
  }
}

function setActiveTab(button) {
  let tabs = document.querySelectorAll(".tabs button");
  tabs.forEach(btn => btn.classList.remove("activeTab"));
  button.classList.add("activeTab");
}

function startDelayAlert() {
  document.getElementById("delayTab").classList.add("active");
}

function stopDelayAlert() {
  document.getElementById("delayTab").classList.remove("active");
}

function openDelay() {
  localStorage.setItem(currentTab, document.getElementById("notes").value);

  currentTab = "Delay Cases";

  document.getElementById("frame").src = "updated_html_with_global_table_note.html";

  document.getElementById("notes").value = "🚨 Monitoring Delay Cases...";

  stopDelayAlert();
}

function copyNote() {
  let text = document.getElementById("notes");
  text.select();
  document.execCommand("copy");
  alert("Copied ✅");
}

setTimeout(() => {
  startDelayAlert();
}, 4000);

</script>

</body>
</html>
