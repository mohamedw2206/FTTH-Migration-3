<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Clean Pro</title>

<style>
:root{
 --bg:#f3f5f9;
 --card:#ffffff;
 --text:#111;
}

.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#e5e7eb;
}

body{
 margin:0;
 font-family: "Segoe UI", sans-serif;
 background:var(--bg);
 color:var(--text);
}

/* Header */
header{
 background:#111;
 color:#fff;
 padding:14px;
 text-align:center;
 position:relative;
}

header button{
 position:absolute;
 right:15px;
 top:12px;
}

/* Tabs */
.tabs{
 display:flex;
 gap:8px;
 padding:10px;
}

.tabs button{
 border:none;
 padding:7px 14px;
 border-radius:20px;
 background:var(--card);
 cursor:pointer;
}

.tabs button.active{
 background:#2563eb;
 color:#fff;
}

/* Dashboard */
#dashboard{
 display:flex;
 gap:10px;
 padding:10px;
}

#dashboard div{
 flex:1;
 background:var(--card);
 padding:10px;
 border-radius:10px;
 text-align:center;
}

/* Status */
#statusBar{
 margin:10px;
 padding:10px;
 border-radius:10px;
 color:#fff;
 text-align:center;
 font-weight:bold;
}

/* Notes */
.notes-box{
 margin:15px;
}

.notes-title{
 font-size:13px;
 opacity:.6;
 margin-bottom:6px;
}

#notes{
 background:var(--card);
 padding:18px;
 border-radius:12px;
 min-height:170px;
 line-height:1.7;
 box-shadow:0 2px 8px rgba(0,0,0,.05);
 white-space:pre-wrap;
 outline:none;
}

/* Highlight */
.key{color:#2563eb;font-weight:600;}
.title{color:#dc2626;font-weight:700;}
.line{margin-bottom:4px;}

/* Buttons */
button{
 margin:5px;
 padding:6px 12px;
 border:none;
 border-radius:6px;
 cursor:pointer;
}

.copy{background:#10b981;color:#fff;}
.gen{background:#7c3aed;color:#fff;}
.save{background:#f59e0b;color:#fff;}

/* AI */
#aiBox{
 margin:15px;
 padding:12px;
 background:#111;
 color:#fff;
 border-radius:10px;
}

#aiInput{
 width:100%;
 margin-top:6px;
 padding:6px;
 border-radius:6px;
 border:none;
}

/* Notification */
.notify{
 position:fixed;
 top:20px;
 right:20px;
 background:#dc2626;
 color:#fff;
 padding:10px;
 border-radius:6px;
}
</style>

</head>

<body>

<header>
FTTH Clean Pro
<button onclick="toggleMode()">🌙</button>
</header>

<div id="dashboard">
<div>Total: <span id="total">0</span></div>
<div>Delayed: <span id="delayed">0</span></div>
<div>Active: <span id="active">0</span></div>
</div>

<div class="tabs">
<button onclick="loadTab('Survey');setActive(this)">Survey</button>
<button onclick="loadTab('Unreached');setActive(this)">Unreached</button>
<button onclick="loadTab('Dispatch');setActive(this)">Dispatch</button>
<button onclick="loadTab('Overall');setActive(this)">Overall</button>
</div>

<div id="statusBar">Ready</div>

<div style="padding:10px">
📅 Start Date: <input type="date" id="startDate">
</div>

<div class="notes-box">
<div class="notes-title">📒 Notes</div>
<div id="notes" contenteditable="true"></div>
</div>

<div style="padding:10px">
<button class="copy" onclick="copyNote()">Copy</button>
<button class="gen" onclick="generateTT()">Generate TT</button>
<button class="save" onclick="saveCase()">Save</button>
<button onclick="runAI()">AI</button>
</div>

<div id="aiBox">
<b>🤖 AI Assistant</b>
<div id="aiResponse">Ready...</div>
<input id="aiInput" placeholder="generate / delay / save">
</div>

<script>
let currentTab="";
let alertShown={};

/* Dark Mode */
function toggleMode(){
 document.body.classList.toggle("dark");
}

/* Notify */
function notify(msg){
 let n=document.createElement("div");
 n.className="notify";
 n.innerText=msg;
 document.body.appendChild(n);
 setTimeout(()=>n.remove(),2500);
}

/* Color */
function getColor(d){
 if(d<2)return"#22c55e";
 if(d<4)return"#facc15";
 if(d<5)return"#fb923c";
 return"#ef4444";
}

/* Tracking */
setInterval(()=>{
 if(!startDate.value)return;

 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let delayed=d>=5;

 statusBar.innerHTML=`Days: ${d} | ${delayed?"🚨 Delayed":"⏳ Active"}`;
 statusBar.style.background=getColor(d);

 if(delayed&&!alertShown[currentTab]){
  notify("🚨 Delay > 5 Days");
  alertShown[currentTab]=true;
 }

},1000);

/* Data */
let data={
Survey:`⚠️ Survey Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

Unreached:`⚠️ Unreached Survey

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

Dispatch:`⚠️ Dispatch Delay

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

Overall:`🚨 Overall Delay

Delay in overall installation SLA

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`
};

/* Format */
function formatNotes(text){
 let lines=text.split("\n");
 let html="";

 lines.forEach(l=>{
  if(l.includes("⚠️")||l.includes("🚨"))
   html+=`<div class="title line">${l}</div>`;
  else if(l.includes(":")){
   let p=l.split(":");
   html+=`<div class="line"><span class="key">${p[0]}:</span> ${p.slice(1).join(":")}</div>`;
  }else{
   html+=`<div class="line">${l}</div>`;
  }
 });

 return html;
}

/* Load */
function loadTab(t){
 currentTab=t;
 notes.innerHTML=formatNotes(data[t]);
}

/* Active */
function setActive(btn){
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* Copy */
function copyNote(){
 navigator.clipboard.writeText(notes.innerText);
 notify("Copied");
}

/* Save */
function saveCase(){
 let cases=JSON.parse(localStorage.getItem("cases")||"[]");
 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));

 cases.push({tab:currentTab,days:d});
 localStorage.setItem("cases",JSON.stringify(cases));
 updateDash();
 notify("Saved");
}

/* Dashboard */
function updateDash(){
 let c=JSON.parse(localStorage.getItem("cases")||"[]");
 total.innerText=c.length;
 delayed.innerText=c.filter(x=>x.days>=5).length;
 active.innerText=c.filter(x=>x.days<5).length;
}
updateDash();

/* TT */
function generateTT(){
 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let id="TT-"+Date.now();

 let txt=`ID:${id}
Days:${d}

${notes.innerText}`;

 navigator.clipboard.writeText(txt);
 notify("TT Copied");
}

/* AI */
function analyze(text){
 text=text.toLowerCase();

 let rules=[
  {name:"Survey",keys:["fiber","survey","fo"]},
  {name:"Dispatch",keys:["dispatch","ftth"]},
  {name:"Overall",keys:["overall","sla"]}
 ];

 let best=null,score=0;

 rules.forEach(r=>{
  let s=0;
  r.keys.forEach(k=>{if(text.includes(k))s++});
  if(s>score){score=s;best=r;}
 });

 return best;
}

function runAI(){
 let text=notes.innerText;
 let cmd=aiInput.value.toLowerCase();
 let res=analyze(text);

 let out=res?`Detected: ${res.name}`:"Unknown";

 if(text.includes("delay"))
  out+="\nAction: Create TT";

 if(cmd.includes("generate")){
  generateTT();
  out+="\nTT Generated";
 }

 aiResponse.innerText=out;
}
</script>

</body>
</html>
