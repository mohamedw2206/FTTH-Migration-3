<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Smart System FINAL</title>

<style>
:root{
 --primary:#2563eb;
 --danger:#ef4444;
}

body{
 margin:0;
 font-family:'Segoe UI';
 background:#eef2f7;
}

/* Header */
header{
 background:#111;
 color:#fff;
 padding:15px;
 text-align:center;
}

/* Tabs */
.tabs{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 padding:10px;
}

.tabs button{
 padding:6px 12px;
 border:none;
 border-radius:20px;
 background:#fff;
 cursor:pointer;
}

.tabs button.active{
 background:var(--primary);
 color:#fff;
}

/* Status */
#statusBar{
 margin:10px;
 padding:10px;
 border-radius:10px;
 color:#fff;
 font-weight:bold;
 text-align:center;
}

/* Blink */
@keyframes blink{
 0%{opacity:1;}
 50%{opacity:0.3;}
 100%{opacity:1;}
}

.blink{
 animation:blink 1s infinite;
}

/* Notes */
#notes{
 margin:10px;
 padding:15px;
 background:#fff;
 border-radius:12px;
 line-height:1.7;
}

/* Delay Message */
#delayNoteBox{
 display:none;
 margin:10px;
 padding:15px;
 border-radius:12px;
 background:#fee2e2;
 border-left:6px solid #ef4444;
}

/* iframe */
iframe{
 width:100%;
 height:60vh;
 border:none;
}

/* Notify */
.notify{
 position:fixed;
 top:20px;
 right:20px;
 background:#ef4444;
 color:#fff;
 padding:10px;
 border-radius:6px;
}
</style>

</head>

<body>

<header>🔥 FTTH SMART SYSTEM FINAL</header>

<div class="tabs">
<button onclick="openTab('Direct to CSO.html',this)">Direct to CSO</button>
<button onclick="openTab('Network Activation.html',this)">Network Activation</button>
<button onclick="openTab('Check CPE SN Activity.html',this)">Check CPE</button>
<button onclick="openTab('Home Visit De-activation.html',this)">MSAN Deactivation</button>
<button onclick="openTab('Home Visit Grace Period.html',this)">Home Visit Grace</button>
<button onclick="openTab('Home visit Dispatch.html',this)">Dispatch</button>
<button onclick="openTab('Unreached Survey.html',this)">Unreached</button>
<button onclick="openTab('Survey and Resurvey.html',this)">Survey</button>
<button onclick="openTab('Customer readiness notification.html',this)">Readiness</button>
<button onclick="openTab('Deactivated on CST 360.html',this)">CST360</button>
<button onclick="openTab('Delay Monitor.html',this)">🚨 Delay Monitor</button>
<button onclick="openTab('Overall Delay',this)">🚨 Overall</button>
</div>

<div id="statusBar">Ready</div>

<div style="padding:10px">
📅 Start Date: <input type="date" id="date">
</div>

<div id="notes"></div>

<div id="delayNoteBox">
  <div style="font-weight:bold;margin-bottom:6px;">🚨 رسالة للعميل</div>
  <div id="delayMsg"></div>
  <button onclick="copyDelayMsg()">📋 Copy</button>
</div>

<iframe id="frame"></iframe>

<script>
let current="";
let alertShown={};

/* Notify */
function notify(msg){
 let n=document.createElement("div");
 n.className="notify";
 n.innerText=msg;
 document.body.appendChild(n);
 setTimeout(()=>n.remove(),3000);
}

/* Color */
function color(d){
 if(d<2)return"#22c55e";
 if(d<4)return"#facc15";
 if(d<5)return"#fb923c";
 return"#ef4444";
}

/* Tracking */
setInterval(()=>{
 if(!date.value)return;

 let d=Math.floor((new Date()-new Date(date.value))/(1000*60*60*24));
 let delayed=d>=5;

 statusBar.innerHTML=`Days: ${d} | ${delayed?"🚨 Delayed":"⏳ Active"}`;
 statusBar.style.background=color(d);

 if(delayed){
  statusBar.classList.add("blink");
 }else{
  statusBar.classList.remove("blink");
 }

 if(delayed&&!alertShown[current]){
  notify("🚨 Case تجاوزت 5 أيام");
  alertShown[current]=true;
 }

 let msg = delayMessages[current] || delayMessages["Overall Delay"];

 if(delayed){
  delayNoteBox.style.display="block";
  delayMsg.innerText=msg;
 }else{
  delayNoteBox.style.display="none";
 }

},1000);

/* Notes */
let notesData={

"Survey and Resurvey.html":`⚠️ Survey Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
Status: Waiting for action - Activation Team`,

"Unreached Survey.html":`⚠️ Unreached Survey

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
Status: Waiting for action - Activation Team`,

"Home visit Dispatch.html":`⚠️ Dispatch Delay

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
Status: Waiting for action - Activation Team`,

"Overall Delay":`🚨 Overall Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
Status: Waiting for action - Activation Team`

};

/* Messages */
let delayMessages={

"Survey and Resurvey.html":`نعتذر لحضرتك عن أي تأخير حصل في تنفيذ طلب التركيب، تم تصعيد الحالة الادارة المختصه وجاري العمل عليها بشكل عاجل. بنأكد إن الطلب تحت المتابعة المستمرة لسرعة الانتهاء منه، وسيتم التواصل مع حضرتك في أقرب وقت لتحديد الموعد المناسب لإتمام الخدمة. نشكرك على صبرك وتفهمك 🌟.`,

"Unreached Survey.html":`نعتذر لعدم التمكن من الوصول،
وسيتم إعادة المحاولة والتواصل مع حضرتك.`,

"Home visit Dispatch.html":`نعتذر عن تأخير الزيارةنعتذر لحضرتك عن أي تأخير حصل في تنفيذ طلب التركيب، تم تصعيد الحالة الادارة المختصه وجاري العمل عليها بشكل عاجل. بنأكد إن الطلب تحت المتابعة المستمرة لسرعة الانتهاء منه، وسيتم التواصل مع حضرتك في أقرب وقت لتحديد الموعد المناسب لإتمام الخدمة. نشكرك على صبرك وتفهمك 🌟.`,

"Overall Delay":`نعتذر عن التأخير في تنفيذ الطلب بالكامل،
جارٍ التصعيد والمتابعة لإنهاء الخدمة سريعاً.`

};

/* Format */
function format(t){
 let lines=t.split("\n");
 let h="";
 lines.forEach(l=>{
  if(l.includes("⚠️")||l.includes("🚨"))
   h+=`<div style="color:red;font-weight:bold">${l}</div>`;
  else if(l.includes(":")){
   let p=l.split(":");
   h+=`<div><b style="color:#2563eb">${p[0]}:</b> ${p.slice(1).join(":")}</div>`;
  }else h+=`<div>${l}</div>`;
 });
 return h;
}

/* Open */
function openTab(page,btn){
 current=page;
 frame.src=page;

 notes.innerHTML=format(notesData[page]||"");

 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* Copy */
function copyDelayMsg(){
 navigator.clipboard.writeText(delayMsg.innerText);
 notify("تم النسخ");
}
</script>

</body>
</html>
