<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Master Tool</title>

<style>
:root{
 --bg:#eef2f7;
 --card:rgba(255,255,255,0.75);
 --text:#111;
 --primary:#2563eb;
 --danger:#ef4444;
}

body{
 margin:0;
 font-family:'Segoe UI';
 background:linear-gradient(135deg,#e6ecf5,#f8fafc);
 color:var(--text);
}

/* Header */
header{
 background:linear-gradient(90deg,#111,#1f2937);
 color:#fff;
 padding:15px;
 text-align:center;
}

/* Tabs */
.tabs{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 padding:10px;
}

.tabs button{
 padding:6px 12px;
 border:none;
 border-radius:20px;
 background:#fff;
 cursor:pointer;
}

.tabs button.active{
 background:var(--primary);
 color:#fff;
}

/* Status */
#statusBar{
 margin:10px;
 padding:10px;
 border-radius:10px;
 color:#fff;
 font-weight:bold;
 text-align:center;
}

/* Notes */
#notes{
 margin:10px;
 padding:15px;
 background:var(--card);
 border-radius:12px;
 line-height:1.7;
 white-space:pre-wrap;
}

/* Highlight */
.key{color:#2563eb;font-weight:bold;}
.title{color:#ef4444;font-weight:bold;}

/* Frame */
iframe{
 width:100%;
 height:60vh;
 border:none;
}

/* Notification */
.notify{
 position:fixed;
 top:20px;
 right:20px;
 background:#ef4444;
 color:#fff;
 padding:10px;
 border-radius:6px;
}
</style>

</head>

<body>

<header>🔥 FTTH MASTER TOOL</header>

<div class="tabs">
<button onclick="openTab('Direct to CSO.html',this)">Direct to CSO</button>
<button onclick="openTab('Network Activation.html',this)">Network Activation</button>
<button onclick="openTab('Check CPE SN Activity.html',this)">Check CPE</button>
<button onclick="openTab('Home Visit De-activation.html',this)">MSAN Deactivation</button>
<button onclick="openTab('Home Visit Grace Period.html',this)">Home Visit Grace</button>
<button onclick="openTab('Home visit Dispatch.html',this)">Dispatch</button>
<button onclick="openTab('Unreached Survey.html',this)">Unreached</button>
<button onclick="openTab('Survey and Resurvey.html',this)">Survey</button>
<button onclick="openTab('Customer readiness notification.html',this)">Readiness</button>
<button onclick="openTab('Deactivated on CST 360.html',this)">CST360</button>
<button onclick="openTab('Overall Delay',this)">🚨 Overall</button>
</div>

<div id="statusBar">Ready</div>

<div style="padding:10px">
📅 Start Date: <input type="date" id="date">
</div>

<div id="notes"></div>

<iframe id="frame"></iframe>

<script>
let current="";
let alertShown={};

/* Notify */
function notify(msg){
 let n=document.createElement("div");
 n.className="notify";
 n.innerText=msg;
 document.body.appendChild(n);
 setTimeout(()=>n.remove(),3000);
}

/* Color */
function color(d){
 if(d<2)return"#22c55e";
 if(d<4)return"#facc15";
 if(d<5)return"#fb923c";
 return"#ef4444";
}

/* Tracking */
setInterval(()=>{
 if(!date.value)return;

 let d=Math.floor((new Date()-new Date(date.value))/(1000*60*60*24));
 let delayed=d>=5;

 statusBar.innerHTML=`Days: ${d} | ${delayed?"🚨 Delayed":"⏳ Active"}`;
 statusBar.style.background=color(d);

 if(delayed&&!alertShown[current]){
  notify("🚨 Case تجاوزت 5 أيام");
  alertShown[current]=true;
 }

},1000);

/* NOTES FULL */
let notesData={

"Survey and Resurvey.html":`⚠️ Survey Delay

في حالة تجاوز مدة التركيب

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Unreached Survey.html":`⚠️ Unreached Survey

في حالة عدم الوصول للعميل

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Home visit Dispatch.html":`⚠️ Dispatch Delay

في حالة التأخير في الزيارة

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Overall Delay":`🚨 Overall Delay

تأخير في إجمالي التركيب

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`

};

/* Format */
function format(t){
 let lines=t.split("\n");
 let h="";
 lines.forEach(l=>{
  if(l.includes("⚠️")||l.includes("🚨"))
   h+=`<div class="title">${l}</div>`;
  else if(l.includes(":")){
   let p=l.split(":");
   h+=`<div><span class="key">${p[0]}:</span> ${p.slice(1).join(":")}</div>`;
  }else h+=`<div>${l}</div>`;
 });
 return h;
}

/* Open Tab */
function openTab(page,btn){
 current=page;
 frame.src=page;

 let text=notesData[page]||"";
 notes.innerHTML=format(text);

 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}
</script>

</body>
</html>
