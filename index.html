<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH PRO MAX</title>

<style>
body{font-family:Arial;background:#f0f2f5;margin:0}
header{background:#111;color:#fff;padding:15px;text-align:center}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #ddd}
.tabs button{padding:10px;border:none;background:none;cursor:pointer}
.tabs button.active{background:#007bff;color:#fff}

/* Dashboard */
#dashboard{display:flex;gap:20px;padding:10px;background:#fff;font-weight:bold}

/* Status */
#statusBar{color:#fff;padding:8px;text-align:center;font-weight:bold}

/* Date */
.date-box{padding:10px;background:#fff;border-bottom:1px solid #ddd}

/* Notes */
#notes{
min-height:140px;
border:1px solid #ccc;
padding:10px;
background:#fff;
line-height:1.5;
white-space:pre-wrap;
}

/* Highlight */
.key{color:#007bff;font-weight:bold}
.title{color:#dc3545;font-weight:bold}

/* Buttons */
button{margin:5px;padding:6px 12px;cursor:pointer}
.copy{background:#28a745;color:#fff;border:none}
.gen{background:#6f42c1;color:#fff;border:none}
.save{background:#fd7e14;color:#fff;border:none}

/* Notification */
.notify{
position:fixed;
top:20px;
right:20px;
background:#dc3545;
color:#fff;
padding:10px;
border-radius:5px;
z-index:9999;
}

/* Frame */
iframe{width:100%;height:60vh;border:none}
</style>

</head>

<body>

<header><h2>🔥 FTTH PRO MAX SYSTEM</h2></header>

<div id="dashboard">
Total: <span id="total">0</span>
Delayed: <span id="delayed">0</span>
Active: <span id="active">0</span>
</div>

<div class="tabs">
<button onclick="loadTab('Survey');setActive(this)">Survey</button>
<button onclick="loadTab('Dispatch');setActive(this)">Dispatch</button>
<button onclick="loadTab('Overall');setActive(this)">Overall</button>
</div>

<div id="statusBar">Ready</div>

<div class="date-box">
📅 Start Date: <input type="date" id="startDate">
</div>

<div style="padding:10px">
<div id="notes" contenteditable="true"></div>

<button class="copy" onclick="copyNote()">Copy</button> <button class="gen" onclick="generateTT()">🎯 Generate TT</button> <button class="save" onclick="saveCase()">💾 Save Case</button>

</div>

<iframe id="frame"></iframe>

<script>
let currentTab="";
let alertShown={};
let interval;

/* Notification */
function notify(msg){
 let n=document.createElement("div");
 n.className="notify";
 n.innerText=msg;
 document.body.appendChild(n);
 setTimeout(()=>n.remove(),3000);
}

/* Gradient Color */
function getColor(d){
 if(d<2)return"#28a745";
 if(d<4)return"#ffc107";
 if(d<5)return"#fd7e14";
 return"#dc3545";
}

/* Start Tracking */
function startTracking(){
 clearInterval(interval);

 interval=setInterval(()=>{
  if(!startDate.value){
   statusBar.innerHTML="⚠️ Select Start Date";
   statusBar.style.background="gray";
   return;
  }

  let start=new Date(startDate.value);
  let now=new Date();
  let days=Math.floor((now-start)/(1000*60*60*24));
  let delayedCase=days>=5;

  statusBar.innerHTML=
  `Start: ${start.toLocaleDateString()} | Days: ${days} | ${delayedCase?"🚨 Delayed":"⏳ Active"}`;

  statusBar.style.background=getColor(days);

  if(delayedCase && !alertShown[currentTab]){
   notify("🚨 Case Delayed > 5 Days");
   alertShown[currentTab]=true;
  }

 },1000);
}

/* Load Tabs */
function loadTab(tab){
 currentTab=tab;

 let data={
  Survey:`⚠️ Survey Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

  Dispatch:`⚠️ Dispatch Delay

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

  Overall:`🚨 Overall Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`
 };

 notes.innerText=data[tab]||"";
 startTracking();
}

/* Active Tab */
function setActive(btn){
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* Copy */
function copyNote(){
 navigator.clipboard.writeText(notes.innerText);
 notify("Copied ✅");
}

/* Save Case */
function saveCase(){
 if(!startDate.value){
  notify("⚠️ Select Date First");
  return;
 }

 let cases=JSON.parse(localStorage.getItem("cases")||"[]");

 let days=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));

 cases.push({
  tab:currentTab,
  days:days,
  date:new Date().toLocaleString()
 });

 localStorage.setItem("cases",JSON.stringify(cases));
 updateDashboard();
 notify("Saved 💾");
}

/* Dashboard */
function updateDashboard(){
 let cases=JSON.parse(localStorage.getItem("cases")||"[]");

 total.innerText=cases.length;
 delayed.innerText=cases.filter(c=>c.days>=5).length;
 active.innerText=cases.filter(c=>c.days<5).length;
}
updateDashboard();

/* TT Generator */
function generateTT(){

 if(!startDate.value){
  notify("⚠️ Select Date First");
  return;
 }

 let days=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let delayedCase=days>=5;

 let id="TT-"+Date.now();

 let result=
`ID: ${id}
Date: ${new Date().toLocaleString()}
Days: ${days}
Status: ${delayedCase?"DELAYED":"ACTIVE"}

${notes.innerText}`;

 navigator.clipboard.writeText(result);
 notify("🎯 TT Copied");
}
</script>

</body>
</html>
