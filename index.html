<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Smart Tools Dashboard</title>

<style>
body {font-family: Arial; background:#f0f2f5; margin:0;}
header {background:#343a40;color:#fff;padding:15px;text-align:center;}

.tabs {display:flex;flex-wrap:wrap;background:#fff;border-bottom:2px solid #ddd;}
.tabs button {padding:10px;border:none;background:none;cursor:pointer;}
.tabs button.activeTab {background:#007bff;color:#fff;}

#statusBar {color:#fff;padding:8px;text-align:center;font-weight:bold;}

.date-box {padding:8px;background:#fff;border-bottom:1px solid #ddd;}

.notes-box {background:#fff;padding:10px;}
#notes {min-height:140px;border:1px solid #ccc;padding:10px;line-height:1.5;}

.key {color:#007bff;font-weight:bold;}
.title-line {color:#dc3545;font-weight:bold;}

button {margin-top:5px;padding:5px 10px;cursor:pointer;}
.copy {background:#28a745;color:#fff;border:none;}
.gen {background:#6f42c1;color:#fff;border:none;}

iframe {width:100%;height:65vh;border:none;}
</style>
</head>

<body>

<header><h2>🔥 FTTH Smart Tools Dashboard</h2></header>

<div class="tabs">
<button onclick="loadTab('Survey and Resurvey.html');setActiveTab(this)">Survey</button>
<button onclick="loadTab('Unreached Survey.html');setActiveTab(this)">Unreached</button>
<button onclick="loadTab('Home visit Dispatch.html');setActiveTab(this)">Dispatch</button>
<button onclick="loadTab('Overall Delay');setActiveTab(this)">🚨 Overall</button>
</div>

<div id="statusBar">Loading...</div>

<div class="date-box">
📅 Start Date: <input type="date" id="startDate" onchange="saveDate()">
</div>

<div class="notes-box">
<b>📒 Notes:</b>
<div id="notes" contenteditable="true"></div>

<button class="copy" onclick="copyNote()">Copy</button>
<button class="gen" onclick="generateTT()">🎯 Generate TT</button>
</div>

<iframe id="frame"></iframe>

<script>
let currentTab="";
let interval;
let alertShown={};

/* Save Date */
function saveDate(){
 localStorage.setItem("date_"+currentTab,startDate.value);
}

/* Gradient */
function getColor(d){
 if(d<2)return"#28a745";
 if(d<4)return"#ffc107";
 if(d<5)return"#fd7e14";
 return"#dc3545";
}

/* Tracking */
function startTracking(){
 clearInterval(interval);

 let saved=localStorage.getItem("date_"+currentTab);
 if(saved)startDate.value=saved;

 interval=setInterval(()=>{
  if(!startDate.value){
   statusBar.innerHTML="⚠️ Select Start Date";
   statusBar.style.background="gray";
   return;
  }

  let start=new Date(startDate.value);
  let now=new Date();
  let days=Math.floor((now-start)/(1000*60*60*24));
  let delayed=days>=5;

  statusBar.innerHTML=
  `Start: ${start.toLocaleDateString()} | Today: ${now.toLocaleDateString()} | Days: ${days} | ${delayed?"🚨 Delayed":"⏳ In Progress"}`;

  statusBar.style.background=getColor(days);

  if(delayed&&!alertShown[currentTab]){
   alert("🚨 Case delayed >5 days!");
   alertShown[currentTab]=true;
  }

 },1000);
}

/* Format */
function formatAuto(t){
 let lines=t.split("\n");
 let h="";
 lines.forEach(l=>{
  if(l.includes("⚠️")||l.includes("🚨"))
   h+=`<div class="title-line">${l}</div>`;
  else if(l.includes(":")){
   let p=l.split(":");
   h+=`<div><span class="key">${p[0]}:</span> ${p.slice(1).join(":")}</div>`;
  } else h+=`<div>${l}</div>`;
 });
 return h;
}

/* Data */
let notesData={
"Survey and Resurvey.html":`⚠️ Survey Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Unreached Survey.html":`⚠️ Unreached Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Home visit Dispatch.html":`⚠️ Dispatch Delay

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Overall Delay":`🚨 Overall Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`
};

/* Load */
function loadTab(p){
 currentTab=p;
 frame.src=p;

 let t=localStorage.getItem(p)||notesData[p]||"";
 notes.innerHTML=formatAuto(t);

 startTracking();
}

/* Active */
function setActiveTab(b){
 document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("activeTab"));
 b.classList.add("activeTab");
}

/* Copy */
function copyNote(){
 navigator.clipboard.writeText(notes.innerText);
 alert("Copied ✅");
}

/* TT Generator */
function generateTT(){

 if(!startDate.value){
  alert("⚠️ Choose Start Date");
  return;
 }

 let days=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let delayed=days>=5;

 let map={
 "Survey and Resurvey.html":
`FBB Non-Technical Complaint
Migration - Installation
FO-Fiber - Delay
Create
Activation Follow Up
4 Hours
Waiting for action-Activation Team`,

 "Unreached Survey.html":
`FBB Non-Technical Complaint
Migration - Installation
FO-Fiber - Delay
Create
Activation Follow Up
4 Hours
Waiting for action-Activation Team`,

 "Home visit Dispatch.html":
`Complaint
Migration - Installation
FTTH-Support - Delay
Create
Activation Follow Up
4 Hours
Waiting for action-Activation Team`,

 "Overall Delay":
`FBB Non-Technical Complaint
Migration - Installation
Over all Delay
Create
Activation Follow Up
4 Hours
Waiting for action-Activation Team`
 };

 let tt=map[currentTab]||"No Template";

 let result=
`===== TT =====
Start: ${startDate.value}
Days: ${days}
Status: ${delayed?"DELAYED":"IN PROGRESS"}

${tt}`;

 navigator.clipboard.writeText(result);
 alert("🎯 TT Copied");
}

</script>
</body>
</html>
