<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH PRO MAX AI SYSTEM</title>

<style>
:root {
  --bg:#f0f2f5;
  --card:#fff;
  --text:#111;
}

.dark {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e5e7eb;
}

body{
  font-family: "Segoe UI", sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  transition:.3s;
}

header{
  background:#111;
  color:#fff;
  padding:15px;
  text-align:center;
  position:relative;
}

header button{
  position:absolute;
  right:20px;
  top:15px;
}

/* Tabs */
.tabs{
  display:flex;
  gap:10px;
  padding:10px;
}

.tabs button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:var(--card);
  cursor:pointer;
}

.tabs button.active{
  background:#007bff;
  color:#fff;
}

/* Dashboard */
#dashboard{
  display:flex;
  gap:10px;
  padding:10px;
}

#dashboard div{
  flex:1;
  background:var(--card);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* Status */
#statusBar{
  margin:10px;
  padding:10px;
  border-radius:10px;
  color:#fff;
  text-align:center;
  font-weight:bold;
}

/* Notes */
#notes{
  margin:10px;
  padding:15px;
  background:var(--card);
  border-radius:10px;
  min-height:150px;
  white-space:pre-wrap;
}

/* AI */
#aiBox{
  margin:10px;
  padding:10px;
  background:#111;
  color:#fff;
  border-radius:10px;
}

/* Buttons */
button{
  margin:5px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.copy{background:#10b981;color:#fff;}
.gen{background:#7c3aed;color:#fff;}
.save{background:#f59e0b;color:#fff;}

/* Notification */
.notify{
 position:fixed;
 top:20px;
 right:20px;
 background:#dc3545;
 color:#fff;
 padding:10px;
 border-radius:6px;
}

iframe{
  width:100%;
  height:50vh;
  border:none;
}
</style>

</head>

<body>

<header>
🔥 FTTH PRO MAX AI SYSTEM
<button onclick="toggleMode()">🌙</button>
</header>

<div id="dashboard">
<div>Total: <span id="total">0</span></div>
<div>Delayed: <span id="delayed">0</span></div>
<div>Active: <span id="active">0</span></div>
</div>

<div class="tabs">
<button onclick="loadTab('Survey');setActive(this)">Survey</button>
<button onclick="loadTab('Dispatch');setActive(this)">Dispatch</button>
<button onclick="loadTab('Overall');setActive(this)">Overall</button>
</div>

<div id="statusBar">Ready</div>

<div style="padding:10px">
📅 Start Date: <input type="date" id="startDate">
</div>

<div id="notes" contenteditable="true"></div>

<div style="padding:10px">
<button class="copy" onclick="copyNote()">Copy</button>
<button class="gen" onclick="generateTT()">🎯 Generate TT</button>
<button class="save" onclick="saveCase()">💾 Save</button>
<button onclick="runAI()">🤖 Run AI</button>
</div>

<!-- AI -->

<div id="aiBox">
<b>🤖 AI Assistant</b>
<div id="aiResponse">Waiting...</div>
<input id="aiInput" placeholder="type command...">
</div>

<iframe id="frame"></iframe>

<script>
let currentTab="";
let alertShown={};

/* Dark Mode */
function toggleMode(){
 document.body.classList.toggle("dark");
}

/* Notification */
function notify(msg){
 let n=document.createElement("div");
 n.className="notify";
 n.innerText=msg;
 document.body.appendChild(n);
 setTimeout(()=>n.remove(),3000);
}

/* Color */
function color(d){
 if(d<2)return"#22c55e";
 if(d<4)return"#facc15";
 if(d<5)return"#fb923c";
 return"#ef4444";
}

/* Tracking */
setInterval(()=>{
 if(!startDate.value)return;

 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let delayedCase=d>=5;

 statusBar.innerHTML=`Days: ${d} | ${delayedCase?"🚨 Delayed":"⏳ Active"}`;
 statusBar.style.background=color(d);

 if(delayedCase&&!alertShown[currentTab]){
  notify("🚨 Delayed Case!");
  alertShown[currentTab]=true;
 }

},1000);

/* Load Tabs */
function loadTab(t){
 currentTab=t;

 let data={
  Survey:`⚠️ Survey Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

  Dispatch:`⚠️ Dispatch Delay

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

  Overall:`🚨 Overall Delay

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`
 };

 notes.innerText=data[t]||"";
}

/* Active */
function setActive(b){
 document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"));
 b.classList.add("active");
}

/* Copy */
function copyNote(){
 navigator.clipboard.writeText(notes.innerText);
 notify("Copied");
}

/* Save */
function saveCase(){
 let cases=JSON.parse(localStorage.getItem("cases")||"[]");
 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));

 cases.push({tab:currentTab,days:d});
 localStorage.setItem("cases",JSON.stringify(cases));

 updateDash();
 notify("Saved");
}

/* Dashboard */
function updateDash(){
 let c=JSON.parse(localStorage.getItem("cases")||"[]");
 total.innerText=c.length;
 delayed.innerText=c.filter(x=>x.days>=5).length;
 active.innerText=c.filter(x=>x.days<5).length;
}
updateDash();

/* TT */
function generateTT(){
 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let id="TT-"+Date.now();

 let result=`ID:${id}
Days:${d}
${notes.innerText}`;

 navigator.clipboard.writeText(result);
 notify("TT Copied");
}

/* AI Engine */
function analyze(text){

 text=text.toLowerCase();

 let rules=[
  {name:"Survey",keys:["fiber","survey","fo"],tt:"FO-Fiber"},
  {name:"Dispatch",keys:["dispatch","ftth"],tt:"FTTH-Support"},
  {name:"Overall",keys:["overall","sla"],tt:"Overall Delay"}
 ];

 let best=null,score=0;

 rules.forEach(r=>{
  let s=0;
  r.keys.forEach(k=>{if(text.includes(k))s++});
  if(s>score){score=s;best=r;}
 });

 return best;
}

/* Run AI */
function runAI(){

 let text=notes.innerText;
 let res=analyze(text);

 let out="";

 if(res){
  out+=`Detected: ${res.name}\nTT: ${res.tt}`;
 }else{
  out="Unknown Case";
 }

 if(text.includes("delay"))
  out+="\nAction: Create TT immediately";

 aiResponse.innerText=out;
}
</script>

</body>
</html>
