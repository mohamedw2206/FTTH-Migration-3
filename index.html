<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH PRO MAX ULTIMATE SYSTEM</title>

<style>
:root{
 --bg:#f0f2f5;
 --card:#fff;
 --text:#111;
}

.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#e5e7eb;
}

body{
 margin:0;
 font-family:Segoe UI;
 background:var(--bg);
 color:var(--text);
 transition:.3s;
}

/* Header */
header{
 background:#111;
 color:#fff;
 padding:15px;
 text-align:center;
 position:relative;
}

header button{
 position:absolute;
 right:20px;
 top:15px;
}

/* Tabs */
.tabs{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 padding:10px;
}

.tabs button{
 border:none;
 padding:8px 12px;
 border-radius:20px;
 background:var(--card);
 cursor:pointer;
}

.tabs button.active{
 background:#007bff;
 color:#fff;
}

/* Dashboard */
#dashboard{
 display:flex;
 gap:10px;
 padding:10px;
}

#dashboard div{
 flex:1;
 background:var(--card);
 padding:10px;
 border-radius:10px;
 text-align:center;
}

/* Status */
#statusBar{
 margin:10px;
 padding:10px;
 border-radius:10px;
 color:#fff;
 text-align:center;
 font-weight:bold;
}

/* Date */
.date-box{
 padding:10px;
}

/* Notes */
#notes{
 margin:10px;
 padding:15px;
 background:var(--card);
 border-radius:10px;
 min-height:180px;
 white-space:pre-wrap;
}

/* Highlight */
.key{color:#2563eb;font-weight:bold;}
.title{color:#dc2626;font-weight:bold;}

/* Buttons */
button{
 margin:5px;
 padding:6px 12px;
 border:none;
 border-radius:6px;
 cursor:pointer;
}

.copy{background:#10b981;color:#fff;}
.gen{background:#7c3aed;color:#fff;}
.save{background:#f59e0b;color:#fff;}

/* AI */
#aiBox{
 margin:10px;
 padding:10px;
 background:#111;
 color:#fff;
 border-radius:10px;
}

#aiInput{
 width:100%;
 margin-top:5px;
 padding:6px;
}

/* Notification */
.notify{
 position:fixed;
 top:20px;
 right:20px;
 background:#dc2626;
 color:#fff;
 padding:10px;
 border-radius:6px;
}

/* Frame */
iframe{
 width:100%;
 height:50vh;
 border:none;
}
</style>

</head>

<body>

<header>
🔥 FTTH PRO MAX ULTIMATE
<button onclick="toggleMode()">🌙</button>
</header>

<!-- Dashboard -->

<div id="dashboard">
<div>Total: <span id="total">0</span></div>
<div>Delayed: <span id="delayed">0</span></div>
<div>Active: <span id="active">0</span></div>
</div>

<!-- Tabs -->

<div class="tabs">
<button onclick="loadTab('Survey');setActive(this)">Survey</button>
<button onclick="loadTab('Unreached');setActive(this)">Unreached</button>
<button onclick="loadTab('Dispatch');setActive(this)">Dispatch</button>
<button onclick="loadTab('Overall');setActive(this)">🚨 Overall</button>
</div>

<!-- Status -->

<div id="statusBar">Ready</div>

<!-- Date -->

<div class="date-box">
📅 Start Date: <input type="date" id="startDate">
</div>

<!-- Notes -->

<div id="notes" contenteditable="true"></div>

<div style="padding:10px">
<button class="copy" onclick="copyNote()">Copy</button>
<button class="gen" onclick="generateTT()">🎯 Generate TT</button>
<button class="save" onclick="saveCase()">💾 Save Case</button>
<button onclick="runAI()">🤖 Run AI</button>
</div>

<!-- AI -->

<div id="aiBox">
<b>🤖 AI Assistant</b>
<div id="aiResponse">Ready...</div>
<input id="aiInput" placeholder="type command (generate / delay / save)">
</div>

<iframe id="frame"></iframe>

<script>
let currentTab="";
let alertShown={};

/* Dark Mode */
function toggleMode(){
 document.body.classList.toggle("dark");
}

/* Notification */
function notify(msg){
 let n=document.createElement("div");
 n.className="notify";
 n.innerText=msg;
 document.body.appendChild(n);
 setTimeout(()=>n.remove(),3000);
}

/* Gradient */
function getColor(d){
 if(d<2)return"#22c55e";
 if(d<4)return"#facc15";
 if(d<5)return"#fb923c";
 return"#ef4444";
}

/* Tracking */
setInterval(()=>{
 if(!startDate.value)return;

 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let delayedCase=d>=5;

 statusBar.innerHTML=`Start: ${startDate.value} | Days: ${d} | ${delayedCase?"🚨 Delayed":"⏳ Active"}`;
 statusBar.style.background=getColor(d);

 if(delayedCase&&!alertShown[currentTab]){
  notify("🚨 Case Delayed > 5 Days");
  alertShown[currentTab]=true;
 }

},1000);

/* Tabs Data (FULL TEXT) */
let data={
Survey:`⚠️ في حالة تجاوز مدة التركيب في هذه المرحلة:

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

Unreached:`⚠️ في حالة تجاوز مدة التركيب في هذه المرحلة:

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

Dispatch:`⚠️ في حالة التأخير في مرحلة Home Visit Dispatch:

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

Overall:`🚨 Delay in Overall Installation SLA:

في حالة وجود تأخير في إجمالي مدة التركيب
مع أن المرحلة الحالية داخل SLA

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`
};

/* Load */
function loadTab(t){
 currentTab=t;
 notes.innerText=data[t]||"";
}

/* Active */
function setActive(btn){
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* Copy */
function copyNote(){
 navigator.clipboard.writeText(notes.innerText);
 notify("Copied ✅");
}

/* Save */
function saveCase(){
 if(!startDate.value){
  notify("⚠️ Select Date First");
  return;
 }

 let cases=JSON.parse(localStorage.getItem("cases")||"[]");
 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));

 cases.push({tab:currentTab,days:d});
 localStorage.setItem("cases",JSON.stringify(cases));

 updateDash();
 notify("Saved 💾");
}

/* Dashboard */
function updateDash(){
 let c=JSON.parse(localStorage.getItem("cases")||"[]");
 total.innerText=c.length;
 delayed.innerText=c.filter(x=>x.days>=5).length;
 active.innerText=c.filter(x=>x.days<5).length;
}
updateDash();

/* TT Generator */
function generateTT(){
 if(!startDate.value){
  notify("⚠️ Select Date First");
  return;
 }

 let d=Math.floor((new Date()-new Date(startDate.value))/(1000*60*60*24));
 let delayedCase=d>=5;
 let id="TT-"+Date.now();

 let result=
`ID: ${id}
Start: ${startDate.value}
Days: ${d}
Status: ${delayedCase?"DELAYED":"ACTIVE"}

${notes.innerText}`;

 navigator.clipboard.writeText(result);
 notify("🎯 TT Copied");
}

/* AI Engine */
function analyze(text){
 text=text.toLowerCase();

 let rules=[
  {name:"Survey",keys:["fiber","survey","fo"],tt:"FO-Fiber"},
  {name:"Dispatch",keys:["dispatch","ftth"],tt:"FTTH-Support"},
  {name:"Overall",keys:["overall","sla"],tt:"Overall Delay"}
 ];

 let best=null,score=0;

 rules.forEach(r=>{
  let s=0;
  r.keys.forEach(k=>{if(text.includes(k))s++});
  if(s>score){score=s;best=r;}
 });

 return best;
}

/* Run AI */
function runAI(){
 let text=notes.innerText;
 let user=aiInput.value.toLowerCase();

 let res=analyze(text);
 let out="";

 if(res){
  out+=`Detected: ${res.name}\nTT: ${res.tt}`;
 }else{
  out="Unknown Case";
 }

 if(text.includes("delay"))
  out+="\n🚨 Action: Create TT immediately";

 if(user.includes("generate")){
  generateTT();
  out+="\n🎯 TT Generated";
 }

 if(user.includes("save")){
  saveCase();
  out+="\n💾 Saved";
 }

 aiResponse.innerText=out;
}
</script>

</body>
</html>
