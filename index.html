<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Ultimate System</title>

<style>
:root{
 --bg:#eef2f7;
 --card:rgba(255,255,255,0.75);
 --text:#111;
 --primary:#2563eb;
 --danger:#ef4444;
}

body{
 font-family:'Segoe UI',sans-serif;
 background:linear-gradient(135deg,#e6ecf5,#f8fafc);
 margin:0;
 color:var(--text);
}

/* Header */
header{
 background:linear-gradient(90deg,#111,#1f2937);
 color:#fff;
 padding:18px;
 text-align:center;
}

/* Tabs */
.tabs{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 padding:10px;
}

.tabs button{
 padding:7px 12px;
 border:none;
 border-radius:20px;
 background:#fff;
 cursor:pointer;
}

.tabs button.active{
 background:var(--primary);
 color:#fff;
}

/* Status */
#statusBar{
 margin:10px;
 padding:10px;
 border-radius:10px;
 color:#fff;
 font-weight:bold;
 text-align:center;
}

/* Notes */
.notes{
 margin:10px;
 padding:15px;
 background:var(--card);
 border-radius:12px;
 line-height:1.7;
 white-space:pre-wrap;
}

/* Highlight */
.key{color:#2563eb;font-weight:bold;}
.title{color:#ef4444;font-weight:bold;}

/* Notification */
.notify{
 position:fixed;
 top:20px;
 right:20px;
 background:#ef4444;
 color:#fff;
 padding:10px;
 border-radius:6px;
}

/* Buttons */
button{
 margin:5px;
 padding:6px 10px;
 border:none;
 border-radius:6px;
 cursor:pointer;
}
</style>

</head>

<body>

<header>🔥 FTTH Ultimate System</header>

<div class="tabs">
<button onclick="loadTab('survey')">Survey</button>
<button onclick="loadTab('unreached')">Unreached</button>
<button onclick="loadTab('dispatch')">Dispatch</button>
<button onclick="loadTab('overall')">Overall</button>
<button onclick="loadTab('delay')">🚨 Delay Monitor</button>
</div>

<div id="statusBar">Ready</div>

<div style="padding:10px">
📅 Start Date: <input type="date" id="date">
</div>

<div id="notes" class="notes"></div>

<div style="padding:10px">
<button onclick="copy()">Copy</button>
</div>

<script>
let current="";
let alertShown={};

/* Notification */
function notify(msg){
 let n=document.createElement("div");
 n.className="notify";
 n.innerText=msg;
 document.body.appendChild(n);
 setTimeout(()=>n.remove(),3000);
}

/* Color */
function color(d){
 if(d<2)return"green";
 if(d<4)return"orange";
 return"red";
}

/* Tracking */
setInterval(()=>{
 if(!date.value)return;

 let d=Math.floor((new Date()-new Date(date.value))/(1000*60*60*24));
 let delayed=d>=5;

 statusBar.innerHTML=`Days: ${d} | ${delayed?"🚨 Delayed":"Active"}`;
 statusBar.style.background=color(d);

 if(delayed&&!alertShown[current]){
  notify("🚨 Case تجاوزت 5 أيام");
  alertShown[current]=true;
 }

},1000);

/* Data FULL */
let data={

survey:`⚠️ Survey / Resurvey Delay

في حالة تجاوز مدة التركيب في هذه المرحلة

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

unreached:`⚠️ Unreached Survey Delay

في حالة عدم الوصول للعميل أو فشل الزيارة
مع تأخر تنفيذ الطلب

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

dispatch:`⚠️ Home Visit Dispatch Delay

في حالة التأخير في مرحلة Home Visit Dispatch

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

overall:`🚨 Overall Installation Delay

في حالة وجود تأخير في إجمالي مدة التركيب
مع أن المرحلة الحالية داخل SLA

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

delay:`🚨 Monitoring Delay Cases

متابعة كل الحالات المتأخرة

Steps:
1. مراجعة الحالات التي تجاوزت 5 أيام
2. التأكد من إنشاء TT
3. متابعة مع Activation Team
4. تحديث العميل بالحالة

Priority: High`
};

/* Format */
function format(t){
 let lines=t.split("\n");
 let h="";
 lines.forEach(l=>{
  if(l.includes("⚠️")||l.includes("🚨"))
   h+=`<div class="title">${l}</div>`;
  else if(l.includes(":")){
   let p=l.split(":");
   h+=`<div><span class="key">${p[0]}:</span> ${p.slice(1).join(":")}</div>`;
  }else h+=`<div>${l}</div>`;
 });
 return h;
}

/* Load */
function loadTab(t){
 current=t;
 notes.innerHTML=format(data[t]);
}

/* Copy */
function copy(){
 navigator.clipboard.writeText(notes.innerText);
 notify("Copied");
}
</script>

</body>
</html>
