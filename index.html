<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Smart Tools Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  margin: 0;
}

header {
  background: #343a40;
  color: white;
  padding: 15px;
  text-align: center;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  background: #fff;
  border-bottom: 2px solid #ddd;
}

.tabs button {
  padding: 10px 15px;
  border: none;
  background: none;
  cursor: pointer;
}

.tabs button:hover { background: #eee; }

.tabs button.activeTab {
  background-color: #007bff;
  color: white;
}

/* Status */
#statusBar {
  color:#fff;
  padding:8px;
  text-align:center;
  font-weight:bold;
}

/* Date */
.date-box {
  padding:8px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

/* Notes */
.notes-box {
  background:#fff;
  padding:10px;
}

#notes {
  width:100%;
  min-height:140px;
  padding:10px;
  border:1px solid #ccc;
  line-height:1.5;
}

/* Highlight */
.key { color:#007bff; font-weight:bold; }
.title-line { color:#dc3545; font-weight:bold; }

iframe {
  width:100%;
  height:70vh;
  border:none;
}

button.copy {
  margin-top:5px;
  padding:5px 10px;
  background:#28a745;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>🔥 FTTH Smart Tools Dashboard</h2>
</header>

<div class="tabs">
  <button onclick="loadTab('Direct to CSO.html'); setActiveTab(this)">Direct to CSO</button>
  <button onclick="loadTab('Network Activation.html'); setActiveTab(this)">Network Activation</button>
  <button onclick="loadTab('Check CPE SN Activity.html'); setActiveTab(this)">Check CPE</button>
  <button onclick="loadTab('Home Visit De-activation.html'); setActiveTab(this)">MSAN Deactivation</button>
  <button onclick="loadTab('Home Visit Grace Period.html'); setActiveTab(this)">Home Visit Grace</button>
  <button onclick="loadTab('Home visit Dispatch.html'); setActiveTab(this)">Dispatch</button>
  <button onclick="loadTab('Unreached Survey.html'); setActiveTab(this)">Unreached Survey</button>
  <button onclick="loadTab('Survey De-activation.html'); setActiveTab(this)">Survey Deactivation</button>
  <button onclick="loadTab('Survey grace period.html'); setActiveTab(this)">Survey Grace</button>
  <button onclick="loadTab('Survey and Resurvey.html'); setActiveTab(this)">Survey</button>
  <button onclick="loadTab('Customer readiness notification.html'); setActiveTab(this)">Readiness</button>
  <button onclick="loadTab('Deactivated on CST 360.html'); setActiveTab(this)">CST360</button>
  <button onclick="openDelay(); setActiveTab(this)">🚨 Delay Cases</button>
  <button onclick="loadTab('Overall Delay'); setActiveTab(this)">🚨 Overall Delay</button>
</div>

<!-- Status -->
<div id="statusBar">Loading...</div>

<!-- Date -->
<div class="date-box">
  📅 Start Date:
  <input type="date" id="startDate" onchange="saveDate()">
</div>

<!-- Notes -->
<div class="notes-box">
  <b>📒 Notes:</b>
  <div id="notes" contenteditable="true"></div>
  <button class="copy" onclick="copyNote()">Copy</button>
</div>

<iframe id="frame" src="Direct to CSO.html"></iframe>

<script>
let currentTab = "Direct to CSO.html";
let interval;
let alertShown = {};

/* Save Date */
function saveDate(){
  localStorage.setItem("date_"+currentTab, startDate.value);
}

/* Gradient Color */
function getColor(days){
  if(days < 2) return "#28a745";
  if(days < 4) return "#ffc107";
  if(days < 5) return "#fd7e14";
  return "#dc3545";
}

/* Tracking */
function startTracking(){
  clearInterval(interval);

  let saved = localStorage.getItem("date_"+currentTab);
  if(saved) startDate.value = saved;

  interval = setInterval(()=>{
    let val = startDate.value;

    if(!val){
      statusBar.innerHTML = "⚠️ Please select start date";
      statusBar.style.background = "gray";
      return;
    }

    let start = new Date(val);
    let now = new Date();

    let days = Math.floor((now - start)/(1000*60*60*24));
    let delayed = days >= 5;

    statusBar.innerHTML =
      `Start: ${start.toLocaleDateString()} | Today: ${now.toLocaleDateString()} | Days: ${days} | ${delayed ? "🚨 Delayed" : "⏳ In Progress"}`;

    statusBar.style.background = getColor(days);

    if(delayed && !alertShown[currentTab]){
      alert("🚨 Case تجاوزت 5 أيام!");
      alertShown[currentTab] = true;
    }

  },1000);
}

/* Auto Highlight */
function formatAuto(text){
  let lines = text.split("\n");
  let html = "";

  lines.forEach(line=>{
    if(line.includes("⚠️")||line.includes("🚨")){
      html += `<div class="title-line">${line}</div>`;
    }
    else if(line.includes(":")){
      let p=line.split(":");
      html += `<div><span class="key">${p[0]}:</span> ${p.slice(1).join(":")}</div>`;
    }
    else{
      html += `<div>${line}</div>`;
    }
  });

  return html;
}

/* Data */
let notesData = {
"Survey and Resurvey.html": `⚠️ في حالة تجاوز مدة التركيب في هذه المرحلة:

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Unreached Survey.html": `⚠️ في حالة تجاوز مدة التركيب في هذه المرحلة:

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: FO-Fiber - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Home visit Dispatch.html": `⚠️ في حالة التأخير في مرحلة Home Visit Dispatch:

Category: Complaint
Subcategory: Migration - Installation
Type: FTTH-Support - Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`,

"Overall Delay": `🚨 Delay in Overall Installation SLA:

في حالة وجود تأخير في إجمالي مدة التركيب
مع أن المرحلة الحالية داخل SLA

Category: FBB Non-Technical Complaint
Subcategory: Migration - Installation
Type: Over all Delay
Action: Create

Assign To: Activation Follow Up
SLA: 4 Hours
Status: Waiting for action - Activation Team`
};

/* Load */
function loadTab(page){
  localStorage.setItem(currentTab, notes.innerText);

  currentTab = page;
  frame.src = page;

  let text = localStorage.getItem(page) || notesData[page] || "";
  notes.innerHTML = formatAuto(text);

  startTracking();
}

function setActiveTab(btn){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("activeTab"));
  btn.classList.add("activeTab");
}

function openDelay(){
  frame.src="updated_html_with_global_table_note.html";
  notes.innerHTML="<div class='title-line'>🚨 Monitoring Delay Cases...</div>";
  startTracking();
}

function copyNote(){
  navigator.clipboard.writeText(notes.innerText);
  alert("Copied ✅");
}
</script>

</body>
</html>
