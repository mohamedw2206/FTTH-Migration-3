<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Activation Tool</title>

<style>
body {font-family: Arial; background:#f5f5f5; padding:20px;}
.container {background:#fff; padding:20px; border-radius:10px; max-width:600px; margin:auto;}
.section {margin-bottom:15px;}
#result {margin-top:20px; padding:15px; border-radius:8px; display:none; font-weight:bold;}
.success {background:#d4edda;}
.warning {background:#fff3cd;}
button {margin-top:10px; padding:8px 12px; border:none; border-radius:6px; cursor:pointer;}
.copy {background:green; color:white;}
.reset {background:red; color:white;}
.note {margin-top:10px; padding:10px; background:#e9ecef; border-radius:8px; display:none;}
</style>

</head>
<body>

<div class="container">

<h3>Network Activation</h3>

<div class="section">
<label>Order Stuck Time</label><br>
<label><input type="radio" name="time" value="within"> Less than 1 Hour</label>
<label><input type="radio" name="time" value="after"> More than 1 Hour</label>
</div>

<div id="result"></div>
<div id="note" class="note"></div>

<button class="copy" onclick="copyResult()">Copy</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generate));

function generate() {
  const time = document.querySelector('input[name="time"]:checked')?.value;

  const result = document.getElementById("result");
  const note = document.getElementById("note");

  if (!time) {
    result.style.display = "none";
    note.style.display = "none";
    return;
  }

  if (time === "within") {
    result.style.display = "block";
    result.className = "success";
    result.innerText =
      "SR: FBB Non Tech follow up -> FTTH Migration -> Network activation within SLA";

    note.style.display = "block";
    note.innerText = "Still within SLA → monitor only.";
  }

  else {
    result.style.display = "block";
    result.className = "warning";
    result.innerText =
      "SR: FBB Non Tech follow up -> FTTH Migration -> Network activation after SLA";

    note.style.display = "block";
    note.innerText = "Exceeded 1 hour → take action and follow up.";
  }
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  if (!text) return;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function resetAll() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.getElementById("result").style.display = "none";
  document.getElementById("note").style.display = "none";
}

</script>

</body>
</html>
